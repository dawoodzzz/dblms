<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LMS — Learning Management System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1e28;
  --surface3: #222736;
  --border: #2a2f3e;
  --border2: #363d52;
  --accent: #6c8fff;
  --accent2: #a78bfa;
  --accent3: #34d399;
  --accent4: #fb923c;
  --accent5: #f472b6;
  --text: #e8eaf0;
  --text2: #9aa3b8;
  --text3: #5a6278;
  --danger: #f87171;
  --success: #34d399;
  --warning: #fbbf24;
  --radius: 10px;
  --radius-lg: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.5px;
}
.logo p { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }
.db-status {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 20px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-family: 'DM Mono', monospace;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
.dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
.nav-section { padding: 16px 12px 8px; }
.nav-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3);
  padding: 0 8px; margin-bottom: 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius);
  cursor: pointer; color: var(--text2); font-size: 13px;
  transition: all 0.15s; font-weight: 400;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(108,143,255,0.12); color: var(--accent); font-weight: 500; }
.nav-item .icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-item .badge {
  margin-left: auto; font-size: 10px; font-family: 'DM Mono', monospace;
  background: var(--surface3); color: var(--text3);
  padding: 1px 6px; border-radius: 99px;
}
.nav-item.active .badge { background: rgba(108,143,255,0.2); color: var(--accent); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  padding: 16px 28px; border-bottom: 1px solid var(--border);
  background: var(--surface); display: flex; align-items: center; gap: 16px;
  flex-shrink: 0;
}
.topbar h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; }
.topbar .domain-badge {
  font-size: 11px; font-family: 'DM Mono', monospace;
  padding: 3px 10px; border-radius: 99px; font-weight: 500;
}
.topbar-actions { margin-left: auto; display: flex; gap: 8px; }
.btn {
  padding: 7px 16px; border-radius: var(--radius); border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text); font-size: 13px;
  cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 500;
  transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #7b9fff; border-color: #7b9fff; color: #fff; }
.btn.danger { background: transparent; border-color: var(--danger); color: var(--danger); }
.btn.danger:hover { background: rgba(248,113,113,0.1); }
.content { flex: 1; overflow-y: auto; padding: 24px 28px; }

/* DASHBOARD */
.dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
}
.stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.stat-card .value { font-family: 'DM Serif Display', serif; font-size: 36px; margin: 6px 0 2px; line-height: 1; }
.stat-card .sub { font-size: 12px; color: var(--text3); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
}
.card h3 { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
.recent-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.recent-item:last-child { border-bottom: none; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.recent-item .info .name { font-weight: 500; color: var(--text); }
.recent-item .info .meta { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.pill {
  margin-left: auto; font-size: 11px; padding: 2px 8px;
  border-radius: 99px; font-weight: 500; white-space: nowrap;
}

/* TABLE */
.table-toolbar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.search-box {
  flex: 1; max-width: 320px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 14px;
  color: var(--text); font-size: 13px; font-family: 'Outfit', sans-serif;
  outline: none;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text3); }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text3);
  background: var(--surface2); border-bottom: 1px solid var(--border);
}
.data-table th:first-child { border-radius: var(--radius) 0 0 0; }
.data-table th:last-child { border-radius: 0 var(--radius) 0 0; }
.data-table td {
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  font-size: 13px; vertical-align: middle;
}
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.data-table tr:last-child td { border-bottom: none; }
.data-table .pk { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.data-table .fk { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent2); }
.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; overflow-x: auto;
}
.table-footer {
  padding: 12px 14px; background: var(--surface2);
  border-top: 1px solid var(--border); border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace;
  display: flex; justify-content: space-between; align-items: center;
}
.pager { display: flex; gap: 4px; }
.pager button {
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); cursor: pointer;
  font-size: 12px; font-family: 'DM Mono', monospace;
}
.pager button:hover { border-color: var(--accent); color: var(--accent); }
.pager button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* MODAL */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); width: 520px; max-width: 95vw;
  max-height: 85vh; overflow-y: auto; padding: 28px;
}
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; }
.form-group input, .form-group select, .form-group textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px 12px;
  color: var(--text); font-size: 13px; font-family: 'Outfit', sans-serif;
  outline: none; transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group select option { background: var(--surface2); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }

/* SQL PLAYGROUND */
.sql-editor {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  margin-bottom: 16px;
}
.sql-editor textarea {
  width: 100%; background: none; border: none; outline: none;
  color: var(--accent3); font-family: 'DM Mono', monospace; font-size: 13px;
  resize: vertical; min-height: 120px; line-height: 1.6;
}
.sql-result {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.sql-result-header {
  padding: 10px 16px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3);
  display: flex; justify-content: space-between;
}
.sql-error { padding: 16px; color: var(--danger); font-family: 'DM Mono', monospace; font-size: 13px; }
.sql-empty { padding: 32px; text-align: center; color: var(--text3); }
.preset-queries { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.preset-btn {
  padding: 5px 12px; border-radius: 99px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); font-size: 12px; cursor: pointer;
  font-family: 'DM Mono', monospace; transition: all 0.15s;
}
.preset-btn:hover { border-color: var(--accent3); color: var(--accent3); }

/* LOADING */
.loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; gap: 20px;
}
.loading h2 { font-family: 'DM Serif Display', serif; font-size: 28px; }
.loading p { color: var(--text2); font-family: 'DM Mono', monospace; font-size: 13px; }
.spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid var(--surface3); border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.progress-log {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
  max-width: 400px; width: 90%; font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--text3); max-height: 160px; overflow-y: auto;
}
.progress-log .ok { color: var(--success); }

/* TAGS */
.tag {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 99px; font-weight: 500;
}
.tag.green { background: rgba(52,211,153,0.15); color: var(--success); }
.tag.blue { background: rgba(108,143,255,0.15); color: var(--accent); }
.tag.purple { background: rgba(167,139,250,0.15); color: var(--accent2); }
.tag.orange { background: rgba(251,146,60,0.15); color: var(--accent4); }
.tag.pink { background: rgba(244,114,182,0.15); color: var(--accent5); }
.tag.gray { background: var(--surface3); color: var(--text2); }

.empty-state {
  text-align: center; padding: 48px 24px; color: var(--text3);
}
.empty-state .icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<script type="module">
import { PGlite } from 'https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js';

let db;
let currentPage = 'dashboard';
let tablePages = {};

function log(msg, ok=false) {
  const el = document.getElementById('progress-log');
  const line = document.createElement('div');
  line.className = ok ? 'ok' : '';
  line.textContent = (ok ? '✓ ' : '· ') + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function initDB() {
  log('Loading PGlite engine...');
  db = new PGlite();
  await db.waitReady;
  log('PGlite ready', true);

  log('Creating schema...');
  await db.exec(`
    CREATE TABLE IF NOT EXISTS instructor (
      instructor_id SERIAL PRIMARY KEY, name VARCHAR(100) NOT NULL,
      email VARCHAR(100) NOT NULL UNIQUE, bio TEXT
    );
    CREATE TABLE IF NOT EXISTS category (
      category_id SERIAL PRIMARY KEY, name VARCHAR(100) NOT NULL
    );
    CREATE TABLE IF NOT EXISTS student (
      student_id SERIAL PRIMARY KEY, name VARCHAR(100) NOT NULL,
      email VARCHAR(100) NOT NULL UNIQUE, created_at TIMESTAMP NOT NULL DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS course (
      course_id SERIAL PRIMARY KEY, title VARCHAR(200) NOT NULL, description TEXT,
      price DECIMAL(10,2), instructor_id INT NOT NULL REFERENCES instructor(instructor_id),
      category_id INT REFERENCES category(category_id)
    );
    CREATE TABLE IF NOT EXISTS module (
      module_id SERIAL PRIMARY KEY, title VARCHAR(200) NOT NULL, sequence INT NOT NULL,
      course_id INT NOT NULL REFERENCES course(course_id)
    );
    CREATE TABLE IF NOT EXISTS lesson (
      lesson_id SERIAL PRIMARY KEY, title VARCHAR(200) NOT NULL, content TEXT,
      duration INT, module_id INT NOT NULL REFERENCES module(module_id)
    );
    CREATE TABLE IF NOT EXISTS assignment (
      assignment_id SERIAL PRIMARY KEY, title VARCHAR(200) NOT NULL,
      due_date DATE, course_id INT NOT NULL REFERENCES course(course_id)
    );
    CREATE TABLE IF NOT EXISTS submission (
      submission_id SERIAL PRIMARY KEY, submitted_at TIMESTAMP NOT NULL DEFAULT NOW(),
      grade DECIMAL(5,2), student_id INT NOT NULL REFERENCES student(student_id),
      assignment_id INT NOT NULL REFERENCES assignment(assignment_id)
    );
    CREATE TABLE IF NOT EXISTS quiz (
      quiz_id SERIAL PRIMARY KEY, title VARCHAR(200) NOT NULL,
      time_limit INT, course_id INT NOT NULL REFERENCES course(course_id)
    );
    CREATE TABLE IF NOT EXISTS question (
      question_id SERIAL PRIMARY KEY, question_text TEXT NOT NULL,
      type VARCHAR(50), quiz_id INT NOT NULL REFERENCES quiz(quiz_id)
    );
    CREATE TABLE IF NOT EXISTS answer_option (
      option_id SERIAL PRIMARY KEY, option_text VARCHAR(300) NOT NULL,
      is_correct BOOLEAN NOT NULL DEFAULT FALSE,
      question_id INT NOT NULL REFERENCES question(question_id)
    );
    CREATE TABLE IF NOT EXISTS quiz_attempt (
      attempt_id SERIAL PRIMARY KEY, score DECIMAL(5,2),
      student_id INT NOT NULL REFERENCES student(student_id),
      quiz_id INT NOT NULL REFERENCES quiz(quiz_id)
    );
    CREATE TABLE IF NOT EXISTS enrollment (
      enrollment_id SERIAL PRIMARY KEY, enrolled_at TIMESTAMP NOT NULL DEFAULT NOW(),
      status VARCHAR(50), student_id INT NOT NULL REFERENCES student(student_id),
      course_id INT NOT NULL REFERENCES course(course_id)
    );
    CREATE TABLE IF NOT EXISTS certificate (
      certificate_id SERIAL PRIMARY KEY, issued_date DATE NOT NULL,
      cert_url VARCHAR(500), enrollment_id INT NOT NULL UNIQUE REFERENCES enrollment(enrollment_id)
    );
    CREATE TABLE IF NOT EXISTS payment (
      payment_id SERIAL PRIMARY KEY, amount DECIMAL(10,2) NOT NULL,
      status VARCHAR(50), student_id INT NOT NULL REFERENCES student(student_id)
    );
    CREATE TABLE IF NOT EXISTS discussion_forum (

async function updateBadges() {
  for (const [nav, cfg] of Object.entries(tableConfig)) {
    try {
      const r = await db.query(`SELECT COUNT(*) as c FROM ${cfg.table}`);
      const el = document.getElementById('badge-' + nav);
      if (el) el.textContent = r.rows[0].c;
    } catch(e) {}
  }
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');

  const title = document.getElementById('page-title');
  const badge = document.getElementById('domain-badge');
  const actions = document.getElementById('topbar-actions');
  badge.style.display = 'none';
  actions.innerHTML = '';

  if (page === 'dashboard') {
    title.textContent = 'Dashboard';
    renderDashboard();
  } else if (page === 'sql') {
    title.textContent = 'SQL Playground';
    renderSQL();
  } else if (tableConfig[page]) {
    const cfg = tableConfig[page];
    title.textContent = cfg.title;
    badge.style.display = '';
    badge.textContent = cfg.domain;
    badge.style.cssText = `background:rgba(108,143,255,0.12);color:var(--accent);padding:3px 10px;border-radius:99px;font-size:11px;font-family:'DM Mono',monospace`;
    if (cfg.domain === 'Assessment') badge.style.cssText = badge.style.cssText.replace('rgba(108,143,255,0.12)','rgba(251,146,60,0.12)').replace('var(--accent)','var(--accent4)');
    if (cfg.domain === 'Progress') badge.style.cssText = badge.style.cssText.replace('rgba(108,143,255,0.12)','rgba(52,211,153,0.12)').replace('var(--accent)','var(--accent3)');
    if (cfg.domain === 'Social') badge.style.cssText = badge.style.cssText.replace('rgba(108,143,255,0.12)','rgba(244,114,182,0.12)').replace('var(--accent)','var(--accent5)');
    actions.innerHTML = `<button class="btn primary" onclick="openAddModal('${page}')">+ Add Row</button>`;
    renderTable(page);
  }
  window._currentPage = page;
}

async function renderDashboard() {
  const content = document.getElementById('content');
  const counts = {};
  const tables = ['student','course','enrollment','payment'];
  for (const t of tables) {
    const r = await db.query(`SELECT COUNT(*) as c FROM ${t}`);
    counts[t] = r.rows[0].c;
  }
  const revRes = await db.query(`SELECT SUM(amount) as total FROM payment WHERE status='completed'`);
  const rev = parseFloat(revRes.rows[0].total || 0).toFixed(2);
  const recentStudents = await db.query(`SELECT * FROM student ORDER BY created_at DESC LIMIT 5`);
  const recentCourses = await db.query(`SELECT c.*, i.name as instructor_name FROM course c JOIN instructor i ON c.instructor_id=i.instructor_id ORDER BY c.course_id DESC LIMIT 5`);
  const recentEnrollments = await db.query(`SELECT e.*, s.name as student_name, co.title as course_title FROM enrollment e JOIN student s ON e.student_id=s.student_id JOIN course co ON e.course_id=co.course_id ORDER BY e.enrolled_at DESC LIMIT 5`);

  const avatarColors = ['#6c8fff','#a78bfa','#34d399','#fb923c','#f472b6'];
  const initials = n => n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const statusPill = s => {
    const m = {completed:'green',active:'blue',pending:'orange'};
    return `<span class="pill tag ${m[s]||'gray'}">${s}</span>`;
  };

  content.innerHTML = `
    <div class="dashboard-grid">
      <div class="stat-card"><div class="label">Total Students</div><div class="value" style="color:var(--accent)">${counts['student']}</div><div class="sub">registered users</div></div>
      <div class="stat-card"><div class="label">Active Courses</div><div class="value" style="color:var(--accent2)">${counts['course']}</div><div class="sub">across 6 categories</div></div>
      <div class="stat-card"><div class="label">Enrollments</div><div class="value" style="color:var(--accent3)">${counts['enrollment']}</div><div class="sub">total enrollments</div></div>
      <div class="stat-card"><div class="label">Revenue</div><div class="value" style="color:var(--accent4)">$${rev}</div><div class="sub">completed payments</div></div>
    </div>
    <div class="two-col" style="margin-bottom:16px">
      <div class="card">
        <h3>Recent Students</h3>
        ${recentStudents.rows.map((s,i) => `
          <div class="recent-item">
            <div class="avatar" style="background:${avatarColors[i%5]}22;color:${avatarColors[i%5]}">${initials(s.name)}</div>
            <div class="info"><div class="name">${s.name}</div><div class="meta">${s.email}</div></div>
            <span class="tag blue" style="margin-left:auto;font-size:11px">#${s.student_id}</span>
          </div>`).join('')}
      </div>
      <div class="card">
        <h3>Recent Enrollments</h3>
        ${recentEnrollments.rows.map(e => `
          <div class="recent-item">
            <div class="info" style="flex:1">
              <div class="name">${e.student_name}</div>
              <div class="meta">${e.course_title}</div>
            </div>
            ${statusPill(e.status)}
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <h3>Courses</h3>
      ${recentCourses.rows.map(c => `
        <div class="recent-item">
          <div class="info" style="flex:1"><div class="name">${c.title}</div><div class="meta">by ${c.instructor_name}</div></div>
          <span class="tag green" style="margin-left:8px">$${c.price}</span>
        </div>`).join('')}
    </div>
  `;
}

async function renderTable(page, searchTerm='') {
  const cfg = tableConfig[page];
  if (!cfg) return;
  const content = document.getElementById('content');
  const pageNum = tablePages[page] || 1;
  const perPage = 15;
  const offset = (pageNum - 1) * perPage;
  let where = '';
  if (searchTerm && cfg.cols.length > 1) {
    const textCols = cfg.cols.filter(c => !c.endsWith('_id') && c !== cfg.pk);
    if (textCols.length > 0) {
      where = `WHERE ${textCols.map(c=>`CAST(${c} AS TEXT) ILIKE '%${searchTerm.replace(/'/g,"''")}%'`).join(' OR ')}`;
    }
  }
  const total = await db.query(`SELECT COUNT(*) as c FROM ${cfg.table} ${where}`);
  const totalRows = parseInt(total.rows[0].c);
  const totalPages = Math.ceil(totalRows / perPage);
  const rows = await db.query(`SELECT ${cfg.cols.join(',')} FROM ${cfg.table} ${where} ORDER BY ${cfg.pk || cfg.cols[0]} ${cfg.pk?'DESC':''} LIMIT ${perPage} OFFSET ${offset}`);

  const formatCell = (col, val, cfg) => {
    if (val === null || val === undefined) return `<span style="color:var(--text3);font-style:italic">null</span>`;
    if (col === cfg.pk) return `<span class="pk">${val}</span>`;
    if (col.endsWith('_id') && col !== cfg.pk) return `<span class="fk">${val}</span>`;
    if (typeof val === 'boolean') return val ? `<span class="tag green">true</span>` : `<span class="tag gray">false</span>`;
    if (col === 'status') {
      const m = {completed:'green',active:'blue',pending:'orange'};
      return `<span class="tag ${m[val]||'gray'}">${val}</span>`;
    }
    if (col === 'rating') return '⭐'.repeat(parseInt(val));
    if (col === 'price' || col === 'amount') return `$${parseFloat(val).toFixed(2)}`;
    if (col === 'grade' || col === 'score') return `<span style="color:var(--accent3);font-weight:500">${parseFloat(val).toFixed(1)}</span>`;
    const str = String(val);
    return str.length > 60 ? str.slice(0,60) + '…' : str;
  };

  const pagerHTML = totalPages > 1 ? Array.from({length:totalPages},(_,i)=>i+1).map(p=>`<button class="${p===pageNum?'active':''}" onclick="goPage('${page}',${p})">${p}</button>`).join('') : '';

  content.innerHTML = `
    <div class="table-toolbar">
      <input class="search-box" placeholder="Search ${cfg.title.toLowerCase()}…" value="${searchTerm}" oninput="searchTable('${page}',this.value)" />
      <span style="color:var(--text3);font-size:12px;font-family:'DM Mono',monospace">${totalRows} rows</span>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>${cfg.labels.map(l=>`<th>${l}</th>`).join('')}<th>Actions</th></tr></thead>
        <tbody>
          ${rows.rows.length === 0 ? `<tr><td colspan="${cfg.cols.length+1}"><div class="empty-state"><div class="icon">📭</div><p>No rows found</p></div></td></tr>` :
          rows.rows.map(row => `<tr>
            ${cfg.cols.map(col => `<td>${formatCell(col, row[col], cfg)}</td>`).join('')}
            <td>
              <button class="btn" style="padding:4px 10px;font-size:11px" onclick="openEditModal('${page}',${JSON.stringify(row).replace(/"/g,'&quot;')})">Edit</button>
              ${cfg.pk ? `<button class="btn danger" style="padding:4px 10px;font-size:11px;margin-left:4px" onclick="deleteRow('${page}',${row[cfg.pk]})">Del</button>` : ''}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="table-footer">
        <span>Showing ${offset+1}–${Math.min(offset+perPage,totalRows)} of ${totalRows} rows · table: ${cfg.table}</span>
        <div class="pager">${pagerHTML}</div>
      </div>
    </div>
  `;
}

window.goPage = (page, p) => { tablePages[page] = p; renderTable(page, window._searchTerm||''); };
window.searchTable = (page, val) => { window._searchTerm = val; tablePages[page] = 1; renderTable(page, val); };

function buildFormHTML(cfg, rowData={}) {
  const half = [];
  const full = [];
  for (const f of cfg.form) {
    const val = rowData[f.k] !== undefined ? rowData[f.k] : '';
    const isTextarea = f.t === 'textarea';
    const isCheckbox = f.t === 'checkbox';
    let input;
    if (isTextarea) input = `<textarea id="field-${f.k}" placeholder="${f.l}">${val}</textarea>`;
    else if (isCheckbox) input = `<select id="field-${f.k}"><option value="true" ${val===true||val==='true'?'selected':''}>true</option><option value="false" ${!val||val===false||val==='false'?'selected':''}>false</option></select>`;
    else input = `<input id="field-${f.k}" type="${f.t}" value="${val}" placeholder="${f.l}"/>`;
    const group = `<div class="form-group${isTextarea?'  full':''}"><label>${f.l}</label>${input}</div>`;
    if (isTextarea) full.push(group);
    else half.push(group);
  }
  return `<div class="form-grid">${half.join('')}${full.join('')}</div>`;
}

function getFormValues(cfg) {
  const vals = {};
  for (const f of cfg.form) {
    const el = document.getElementById('field-' + f.k);
    if (!el) continue;
    if (f.t === 'number') vals[f.k] = el.value === '' ? null : parseFloat(el.value);
    else vals[f.k] = el.value === '' ? null : el.value;
  }
  return vals;
}

window.openAddModal = (page) => {
  const cfg = tableConfig[page];
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Add ${cfg.title.slice(0,-1)}</h3>
        ${buildFormHTML(cfg)}
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn primary" onclick="submitAdd('${page}')">Add Row</button>
        </div>
      </div>
    </div>`;
};

window.openEditModal = (page, row) => {
  if (typeof row === 'string') row = JSON.parse(row);
  const cfg = tableConfig[page];
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Edit ${cfg.title.slice(0,-1)}</h3>
        ${buildFormHTML(cfg, row)}
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn primary" onclick="submitEdit('${page}',${row[cfg.pk]})">Save Changes</button>
        </div>
      </div>
    </div>`;
};

window.closeModal = () => { document.getElementById('modal-container').innerHTML = ''; };

window.submitAdd = async (page) => {
  const cfg = tableConfig[page];
  const vals = getFormValues(cfg);
  const keys = Object.keys(vals).filter(k => vals[k] !== null && vals[k] !== '');
  const placeholders = keys.map((_,i) => `$${i+1}`);
  try {
    await db.query(`INSERT INTO ${cfg.table} (${keys.join(',')}) VALUES (${placeholders.join(',')})`, keys.map(k=>vals[k]));
    closeModal();
    await updateBadges();
    renderTable(page, window._searchTerm||'');
  } catch(e) { alert('Error: ' + e.message); }
};

window.submitEdit = async (page, id) => {
  const cfg = tableConfig[page];
  const vals = getFormValues(cfg);
  const keys = Object.keys(vals);
  const sets = keys.map((k,i) => `${k}=$${i+1}`);
  try {
    await db.query(`UPDATE ${cfg.table} SET ${sets.join(',')} WHERE ${cfg.pk}=$${keys.length+1}`, [...keys.map(k=>vals[k]), id]);
    closeModal();
    renderTable(page, window._searchTerm||'');
  } catch(e) { alert('Error: ' + e.message); }
};

window.deleteRow = async (page, id) => {
  if (!confirm('Delete this row?')) return;
  const cfg = tableConfig[page];
  try {
    await db.query(`DELETE FROM ${cfg.table} WHERE ${cfg.pk}=$1`, [id]);
    await updateBadges();
    renderTable(page, window._searchTerm||'');
  } catch(e) { alert('Cannot delete — may be referenced by other records.\n' + e.message); }
};

const presetQueries = [
  { label: 'Top students by submissions', sql: `SELECT s.name, COUNT(sub.submission_id) as submissions, AVG(sub.grade) as avg_grade\nFROM student s\nJOIN submission sub ON s.student_id = sub.student_id\nGROUP BY s.student_id, s.name\nORDER BY avg_grade DESC;` },
  { label: 'Course revenue', sql: `SELECT c.title, COUNT(p.payment_id) as payments, SUM(p.amount) as revenue\nFROM course c\nJOIN payment p ON c.price = p.amount\nGROUP BY c.course_id, c.title\nORDER BY revenue DESC;` },
  { label: 'Enrollment stats', sql: `SELECT c.title, COUNT(e.enrollment_id) as enrolled, \nCOUNT(CASE WHEN e.status='completed' THEN 1 END) as completed\nFROM course c\nLEFT JOIN enrollment e ON c.course_id = e.course_id\nGROUP BY c.course_id, c.title\nORDER BY enrolled DESC;` },
  { label: 'Quiz leaderboard', sql: `SELECT s.name, AVG(qa.score) as avg_score, COUNT(qa.attempt_id) as attempts\nFROM student s\nJOIN quiz_attempt qa ON s.student_id = qa.student_id\nGROUP BY s.student_id, s.name\nORDER BY avg_score DESC;` },
  { label: 'Course reviews summary', sql: `SELECT c.title, AVG(r.rating) as avg_rating, COUNT(r.review_id) as review_count\nFROM course c\nLEFT JOIN review r ON c.course_id = r.course_id\nGROUP BY c.course_id, c.title\nORDER BY avg_rating DESC;` },
  { label: 'Students with certificates', sql: `SELECT s.name, c2.title as course, cert.issued_date\nFROM certificate cert\nJOIN enrollment e ON cert.enrollment_id = e.enrollment_id\nJOIN student s ON e.student_id = s.student_id\nJOIN course c2 ON e.course_id = c2.course_id\nORDER BY cert.issued_date DESC;` },
];

function renderSQL() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="preset-queries">
      ${presetQueries.map(q=>`<button class="preset-btn" onclick="loadPreset(${JSON.stringify(q.sql).replace(/"/g,'&quot;')})">${q.label}</button>`).join('')}
    </div>
    <div class="sql-editor">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-family:'DM Mono',monospace">SQL · PGlite (PostgreSQL)</div>
      <textarea id="sql-input" spellcheck="false" placeholder="SELECT * FROM student LIMIT 10;">SELECT s.name, c.title, e.status, e.enrolled_at
FROM enrollment e
JOIN student s ON e.student_id = s.student_id
JOIN course c ON e.course_id = c.course_id
ORDER BY e.enrolled_at DESC
LIMIT 20;</textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn primary" onclick="runSQL()">▶ Run Query</button>
        <button class="btn" onclick="document.getElementById('sql-input').value=''">Clear</button>
      </div>
    </div>
    <div id="sql-result"></div>
  `;
}

window.loadPreset = (sql) => {
  document.getElementById('sql-input').value = sql;
};

window.runSQL = async () => {
  const sql = document.getElementById('sql-input').value.trim();
  if (!sql) return;
  const result = document.getElementById('sql-result');
  result.innerHTML = '<div class="sql-result"><div class="sql-result-header"><span>Running…</span></div></div>';
  try {
    const r = await db.query(sql);
    if (!r.rows || r.rows.length === 0) {
      result.innerHTML = `<div class="sql-result"><div class="sql-result-header"><span style="color:var(--success)">✓ Query executed successfully · 0 rows returned</span></div><div class="sql-empty">No results</div></div>`;
      return;
    }
    const cols = Object.keys(r.rows[0]);
    result.innerHTML = `
      <div class="sql-result">
        <div class="sql-result-header">
          <span style="color:var(--success)">✓ ${r.rows.length} rows returned</span>
          <span>${cols.length} columns</span>
        </div>
        <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${r.rows.map(row=>`<tr>${cols.map(c=>{
            const v = row[c];
            if (v === null) return `<td><span style="color:var(--text3);font-style:italic">null</span></td>`;
            if (typeof v === 'boolean') return `<td><span class="tag ${v?'green':'gray'}">${v}</span></td>`;
            const s = String(v);
            return `<td>${s.length > 80 ? s.slice(0,80)+'…' : s}</td>`;
          }).join('')}</tr>`).join('')}</tbody>
        </table>
        </div>
      </div>`;
  } catch(e) {
    result.innerHTML = `<div class="sql-result"><div class="sql-result-header"><span style="color:var(--danger)">✗ Error</span></div><div class="sql-error">${e.message}</div></div>`;
  }
};
